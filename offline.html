<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 版本號：V1.0.5 (修改此處可強制所有裝置更新) -->
    <meta name="app-version" content="1.0.5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="五結POS">
    <title>五結大腸麵線 斷網版POS</title>
    <style>
        :root {
            --primary: #2563eb; --primary-light: #eff6ff; --bg: #f3f4f6;
            --text: #1f2937; --red: #ef4444; --green: #16a34a;
        }
        * { box-sizing: border-box; touch-action: manipulation; }
        body, html {
            margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); color: var(--text); -webkit-user-select: none; user-select: none;
            height: auto; overflow: visible;
        }

        /* --- 核心排版結構 --- */
        .app-container { display: flex; flex-direction: column; width: 100%; }
        .menu-section { padding: 12px; height: auto; overflow: visible; }
        .cart-section { background: white; display: flex; flex-direction: column; height: auto; overflow: visible; border-top: 4px solid #d1d5db; padding-bottom: 60px; }
        .cart-list { padding: 12px; margin: 0; display: flex; flex-direction: column; gap: 8px; background: #f9fafb; height: auto; overflow: visible; min-height: 120px; }

        @media (min-width: 768px) {
            body, html { height: 100%; overflow: hidden; }
            .app-container { flex-direction: row; height: 100dvh; }
            .menu-section { flex: 1; height: 100%; overflow-y: auto; padding: 16px; }
            .cart-section { width: 400px; height: 100%; border-top: none; border-left: 2px solid #d1d5db; padding-bottom: 0; }
            .cart-list { flex: 1; overflow-y: auto; }
        }

        /* --- 內部元件設計 --- */
        .header { background: white; padding: 12px 16px; border-radius: 12px; font-weight: bold; border-left: 6px solid var(--primary); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 12px; }
        .header-title { font-size: 20px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;}
        .header-tag { background: var(--primary); color: white; padding: 2px 6px; border-radius: 6px; font-size: 16px; }
        .history-btn { margin-left: 8px; padding: 6px 12px; font-size: 14px; background: #4b5563; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .offline-status { font-size: 11px; background: var(--green); color: white; padding: 2px 6px; border-radius: 10px; display: none; }

        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        @media (min-width: 480px) { .menu-grid { grid-template-columns: repeat(3, 1fr); } }
        .menu-btn { background: white; border: 3px solid transparent; border-radius: 12px; padding: 16px 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: pointer; transition: 0.1s; box-shadow: 0 2px 6px rgba(0,0,0,0.06); -webkit-tap-highlight-color: transparent; }
        .menu-btn.active { background: var(--primary-light); border-color: var(--primary); }
        .badge { position: absolute; top: -6px; right: -6px; background: var(--red); color: white; width: 28px; height: 28px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; }
        .menu-btn.active .badge { display: flex; }
        .menu-name { font-size: 18px; font-weight: bold; margin-bottom: 4px; text-align: center;}
        .menu-price { font-size: 16px; font-weight: bold; color: #6b7280; }

        .cart-header { background: #1f2937; color: white; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; font-size: 18px; font-weight: bold; }
        .clear-btn { background: #4b5563; border: none; color: white; padding: 8px 14px; border-radius: 8px; font-size: 14px; font-weight: bold; }
        .cart-item { background: white; padding: 12px; border-radius: 10px; border: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
        .qty-controls { display: flex; align-items: center; background: #f3f4f6; border-radius: 8px; border: 1px solid #d1d5db; overflow: hidden; }
        .qty-btn { background: white; border: none; width: 36px; height: 36px; font-size: 20px; font-weight: bold; color: #4b5563; }

        .checkout-panel { padding: 16px; border-top: 2px solid #e5e7eb; background: white; }
        .total-price { font-size: 42px; font-weight: 900; color: var(--red); line-height: 1; }
        .input-wrapper input { width: 100%; padding: 14px 14px 14px 40px; border: 2px solid #d1d5db; border-radius: 10px; font-size: 24px; font-weight: bold; text-align: right; }
        .quick-btns { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 12px; }
        .quick-btn { padding: 12px 0; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; }
        .change-row { background: #f3f4f6; padding: 16px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin: 12px 0; }
        .change-val { font-size: 32px; font-weight: 900; }
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .submit-btn { padding: 18px; color: white; border: none; border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer; }

        /* --- 歷史訂單 & 訊息盒彈窗 --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 500px; max-height: 85vh; border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; }
        .history-list { padding: 16px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 10px; background: #f3f4f6; }
        .history-item { border: 2px solid #e5e7eb; border-radius: 12px; padding: 12px; background: #fff; }
        .history-item-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .del-order-btn { background: #fee2e2; color: var(--red); border: 1px solid #fecaca; border-radius: 6px; padding: 6px 12px; font-size: 14px; font-weight: bold; z-index: 10; }

        /* 自定義訊息盒 (取代 Alert/Confirm) */
        #msg-box { display: none; z-index: 2000; }
        .msg-content { background: white; padding: 24px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .msg-text { font-size: 18px; font-weight: bold; margin-bottom: 20px; white-space: pre-wrap; line-height: 1.5; }
        .msg-btns { display: flex; gap: 10px; }
        .msg-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }

        /* --- 列印專用樣式 --- */
        #print-area { display: none; }
        @media print {
            .app-container, .modal-overlay { display: none !important; }
            #print-area { display: block !important; width: 100%; max-width: 300px; font-family: monospace; padding: 10px; }
            @page { margin: 0; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="menu-section">
        <div class="header">
            <div class="header-title">
                <span class="header-tag">五結</span> 大腸麵線
                <button class="history-btn" onclick="openHistory()">📜 歷史紀錄</button>
                <span id="offline-tag" class="offline-status">✓ 離線</span>
            </div>
            <div style="color: #6b7280; font-size: 14px;">03-9505237</div>
        </div>
        <div class="menu-grid" id="menu-grid">
            <!-- 菜單由 JS 動態生成 -->
        </div>
    </div>

    <div class="cart-section">
        <div class="cart-header">
            <span>🛒 購物明細</span>
            <button class="clear-btn" onclick="askClearCart()">清空</button>
        </div>
        <div class="cart-list" id="cart-list">
            <div class="empty-msg" style="padding:40px; text-align:center; color:#9ca3af; font-weight:bold;">等待點餐...</div>
        </div>
        <div class="checkout-panel">
            <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:10px;">
                <span style="font-weight:bold; color:#6b7280;">總計金額</span>
                <span class="total-price" id="total-price">$0</span>
            </div>
            <div class="input-wrapper">
                <span style="position:absolute; left:16px; top:50%; transform:translateY(-50%); font-weight:bold; color:#9ca3af; font-size:24px;">$</span>
                <input type="number" id="paid-input" placeholder="客人付多少？" oninput="handlePaidInput(event)">
            </div>
            <div class="quick-btns">
                <button class="quick-btn btn-green" onclick="setQuickAmount('exact')">剛好</button>
                <button class="quick-btn btn-gray" onclick="setQuickAmount(100)">100</button>
                <button class="quick-btn btn-gray" onclick="setQuickAmount(500)">500</button>
                <button class="quick-btn btn-gray" onclick="setQuickAmount(1000)">1000</button>
                <button class="quick-btn btn-red" onclick="setQuickAmount('clear')">重填</button>
            </div>
            <div class="change-row">
                <span class="change-label">找零</span>
                <span class="change-val" id="change-val">$0</span>
            </div>
            <div class="action-btns">
                <button class="submit-btn" style="background:#4b5563;" onclick="checkout(true)">結帳+列印</button>
                <button class="submit-btn" style="background:var(--primary);" onclick="checkout(false)">完成結帳</button>
            </div>
        </div>
    </div>
</div>

<!-- 歷史紀錄視窗 -->
<div id="history-modal" class="modal-overlay" onclick="closeHistory()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div style="padding:16px; border-bottom:2px solid #e5e7eb; display:flex; justify-content:space-between; align-items:center;">
            <h2 style="margin:0; font-size:18px;">📜 歷史訂單</h2>
            <div style="display:flex; gap:10px;">
                <button onclick="askClearHistory()" style="color:#ef4444; background:none; border:none; font-weight:bold; cursor:pointer;">清空</button>
                <button onclick="closeHistory()" style="font-size:24px; border:none; background:none; color:#9ca3af;">×</button>
            </div>
        </div>
        <div id="history-list-container" class="history-list"></div>
    </div>
</div>

<!-- 自定義訊息盒 -->
<div id="msg-box" class="modal-overlay">
    <div class="msg-content">
        <div id="msg-box-text" class="msg-text"></div>
        <div id="msg-box-btns" class="msg-btns"></div>
    </div>
</div>

<div id="print-area"></div>

<script>
    const MENU = [
        { id: 1, name: '綜合煎', price: 85 }, { id: 2, name: '蚵仔煎', price: 75 },
        { id: 3, name: '蝦仔煎', price: 75 }, { id: 4, name: '蛋煎', price: 65 },
        { id: 5, name: '大腸麵線(大)', price: 60 }, { id: 6, name: '大腸麵線(小)', price: 50 },
        { id: 7, name: '臭豆腐', price: 55 }, { id: 8, name: '炸餛飩', price: 45 },
        { id: 9, name: '米粉羹(大)', price: 40 }, { id: 10, name: '米粉羹(小)', price: 35 },
        { id: 11, name: '餛飩麵', price: 45 }, { id: 12, name: '陽春麵', price: 45 },
        { id: 13, name: '乾麵', price: 45 }, { id: 14, name: '魚丸湯', price: 45 },
        { id: 15, name: '貢丸湯', price: 45 }, { id: 16, name: '餛飩湯', price: 45 },
        { id: 17, name: '一串心', price: 20 }, { id: 18, name: '茶葉蛋', price: 15 }
    ];

    let cart = {}; let paidAmount = '';
    let orderHistory = JSON.parse(localStorage.getItem('wujie_orders')) || [];
    let orderCounter = parseInt(localStorage.getItem('wujie_counter')) || 1;

    // --- 初始化菜單 ---
    function initMenu() {
        const grid = document.getElementById('menu-grid');
        grid.innerHTML = MENU.map(item => `
            <div class="menu-btn" id="btn-${item.id}" onclick="addToCart(${item.id})">
                <div class="badge" id="badge-${item.id}">0</div>
                <div class="menu-name">${item.name}</div>
                <div class="menu-price">$${item.price}</div>
            </div>
        `).join('');
    }

    // --- 自定義訊息盒程式 ---
    function showMsg(text, options = []) {
        return new Promise((resolve) => {
            const box = document.getElementById('msg-box');
            const txt = document.getElementById('msg-box-text');
            const btns = document.getElementById('msg-box-btns');
            txt.innerText = text;
            btns.innerHTML = '';
            
            if (options.length === 0) options = [{ label: '好的', color: 'var(--primary)', val: true }];
            
            options.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'msg-btn';
                b.innerText = opt.label;
                b.style.backgroundColor = opt.color;
                b.style.color = 'white';
                b.onclick = () => { box.style.display = 'none'; resolve(opt.val); };
                btns.appendChild(b);
            });
            box.style.display = 'flex';
        });
    }

    // --- 自動更新功能 ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const swCode = `
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
                self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
            `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob)).then(reg => {
                document.getElementById('offline-tag').style.display = 'inline';
                // 每 30 秒檢查一次 GitHub 是否有新版本
                setInterval(() => reg.update(), 30000);
            });
        });
    }

    // --- 點餐功能 ---
    function addToCart(id) { cart[id] = (cart[id] || 0) + 1; updateUI(); }
    function removeFromCart(id) { if(cart[id]) cart[id]--; if(cart[id]<=0) delete cart[id]; updateUI(); }
    function updateUI() {
        MENU.forEach(item => {
            const btn = document.getElementById('btn-' + item.id);
            const badge = document.getElementById('badge-' + item.id);
            const qty = cart[item.id] || 0;
            if(qty > 0) { btn.classList.add('active'); badge.innerText = qty; } else { btn.classList.remove('active'); }
        });
        const list = document.getElementById('cart-list');
        const total = MENU.reduce((s, i) => s + (cart[i.id] || 0) * i.price, 0);
        let itemsHtml = Object.entries(cart).map(([id, qty]) => {
            const item = MENU.find(m => m.id == id);
            return `<div class="cart-item">
                <div class="item-info"><strong>${item.name}</strong><small>$${item.price}</small></div>
                <div style="display:flex; align-items:center; gap:10px;">
                    <strong style="color:var(--primary)">$${item.price*qty}</strong>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="removeFromCart(${id})">-</button>
                        <span style="width:30px; text-align:center; font-weight:bold;">${qty}</span>
                        <button class="qty-btn" onclick="addToCart(${id})">+</button>
                    </div>
                </div>
            </div>`;
        }).join('');
        list.innerHTML = itemsHtml || '<div class="empty-msg" style="padding:40px; text-align:center; color:#9ca3af; font-weight:bold;">等待點餐...</div>';
        document.getElementById('total-price').innerText = '$' + total;
        
        const paid = parseInt(paidAmount) || 0;
        const changeVal = document.getElementById('change-val');
        if (paidAmount === '') { changeVal.innerText = '$0'; changeVal.style.color = 'var(--text)'; }
        else if (paid >= total) { changeVal.innerText = '$' + (paid - total); changeVal.style.color = 'var(--green)'; }
        else { changeVal.innerText = '不足'; changeVal.style.color = 'var(--red)'; }
    }

    function handlePaidInput(e) { paidAmount = e.target.value; updateUI(); }
    function setQuickAmount(val) {
        const total = MENU.reduce((s, i) => s + (cart[i.id] || 0) * i.price, 0);
        if(val === 'exact') paidAmount = total.toString();
        else if(val === 'clear') paidAmount = '';
        else paidAmount = val.toString();
        document.getElementById('paid-input').value = paidAmount;
        updateUI();
    }

    async function askClearCart() {
        if (Object.keys(cart).length === 0) return;
        const ok = await showMsg('確定要清空目前的點餐嗎？', [{label:'取消', color:'#9ca3af', val:false}, {label:'清空', color: 'var(--red)', val:true}]);
        if (ok) { cart = {}; paidAmount = ''; document.getElementById('paid-input').value = ''; updateUI(); window.scrollTo(0,0); }
    }

    async function checkout(isPrint) {
        const total = MENU.reduce((s, i) => s + (cart[i.id] || 0) * i.price, 0);
        if (total === 0) return showMsg('還沒有點餐喔！');
        const paid = parseInt(paidAmount) || total;
        if (paid < total) return showMsg('客人付的錢不夠喔！');

        const order = { id: orderCounter++, time: new Date().toLocaleTimeString('zh-TW', {hour12:false}), items: [], total, paid, change: paid - total };
        Object.entries(cart).forEach(([id, qty]) => {
            const item = MENU.find(m => m.id == id);
            order.items.push({ name: item.name, qty, subtotal: item.price * qty });
        });
        orderHistory.unshift(order);
        localStorage.setItem('wujie_orders', JSON.stringify(orderHistory));
        localStorage.setItem('wujie_counter', orderCounter);

        if (isPrint) {
            const area = document.getElementById('print-area');
            area.innerHTML = `<div style="text-align:center; font-size:20px; font-weight:bold;">五結大腸麵線</div><hr>${order.items.map(i=>`<div>${i.name} x${i.qty} $${i.subtotal}</div>`).join('')}<hr><strong>總計: $${total}</strong><br>收現: $${paid}<br>找零: $${order.change}<hr><center>謝謝光臨</center>`;
            window.print();
        } else {
            await showMsg(`✅ 結帳完成！\n總計: $${total}\n收現: $${paid}\n找零: $${order.change}`);
        }

        cart = {}; paidAmount = ''; document.getElementById('paid-input').value = ''; 
        updateUI(); window.scrollTo(0,0);
    }

    // --- 歷史紀錄邏輯 ---
    function openHistory() {
        renderHistory();
        document.getElementById('history-modal').style.display = 'flex';
    }
    function closeHistory() { document.getElementById('history-modal').style.display = 'none'; }
    
    function renderHistory() {
        const container = document.getElementById('history-list-container');
        if (orderHistory.length === 0) { container.innerHTML = '<div style="text-align:center; padding:40px; color:#9ca3af;">尚無紀錄</div>'; return; }
        container.innerHTML = orderHistory.map((o, idx) => `
            <div class="history-item" onclick="toggleDetails(${o.id})">
                <div class="history-item-header">
                    <span>#${String(o.id).padStart(3,'0')} <small>${o.time}</small></span>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <strong style="color:var(--red); font-size:18px;">$${o.total}</strong>
                        <button class="del-order-btn" onclick="askDeleteOrder(${idx}, event)">刪除</button>
                    </div>
                </div>
                <div id="details-${o.id}" style="display:none; margin-top:10px; padding-top:10px; border-top:1px dashed #ccc; font-size:14px; color:#666;">
                    ${o.items.map(i=>`<div>${i.name} x${i.qty} $${i.subtotal}</div>`).join('')}
                    <div style="margin-top:5px; text-align:right;">收現:$${o.paid} 找零:$${o.change}</div>
                </div>
            </div>
        `).join('');
    }

    function toggleDetails(id) {
        const el = document.getElementById('details-' + id);
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    async function askDeleteOrder(idx, e) {
        e.stopPropagation();
        const ok = await showMsg('確定要刪除這筆訂單紀錄嗎？', [{label:'取消', color:'#9ca3af', val:false}, {label:'刪除', color: 'var(--red)', val:true}]);
        if (ok) { orderHistory.splice(idx, 1); localStorage.setItem('wujie_orders', JSON.stringify(orderHistory)); renderHistory(); }
    }

    async function askClearHistory() {
        if (orderHistory.length === 0) return;
        const ok = await showMsg('⚠️ 確定要清空所有歷史紀錄嗎？', [{label:'取消', color:'#9ca3af', val:false}, {label:'確定清空', color: 'var(--red)', val:true}]);
        if (ok) { orderHistory = []; localStorage.setItem('wujie_orders', JSON.stringify(orderHistory)); renderHistory(); }
    }

    window.onload = initMenu;
</script>
</body>
</html>
